# Nginx SSL Termination Configuration for Cloud Load Balancers
# This file provides examples for AWS ALB, NGINX, and GCP load balancer SSL termination

# =============================================================================
# AWS ALB (Application Load Balancer) + EC2/Nginx Configuration
# =============================================================================

# AWS ALB handles SSL termination, forwards to nginx on port 80
# nginx.conf or sites-available/default

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # AWS ALB sets these headers when SSL is terminated
    # X-Forwarded-Proto: https
    # X-Forwarded-Port: 443

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to Node.js application
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Static files caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# =============================================================================
# GCP Load Balancer + Cloud Run/GCE Configuration
# =============================================================================

# GCP Load Balancer terminates SSL and forwards to backend service
# For Cloud Run or GCE instance groups

# Backend service configuration (Cloud Run):
# - Service URL: https://your-service.run.app
# - Port: 8080 (or your configured port)
# - Health check: /health

# For GCE instances, nginx config similar to AWS above:
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # GCP sets X-Forwarded-Proto header
    # X-Forwarded-Proto: https

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        # GCP specific headers
        proxy_set_header X-Cloud-Trace-Context $http_x_cloud_trace_context;
    }

    # Health check for GCP load balancer
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# =============================================================================
# Standalone Nginx with SSL Termination (Not Cloud)
# =============================================================================

# Full SSL termination at nginx level
# Requires SSL certificate files

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # SSL Configuration
    ssl_certificate /etc/ssl/certs/your-domain.crt;
    ssl_certificate_key /etc/ssl/private/your-domain.key;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # Static files
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";

        proxy_pass http://127.0.0.1:3000;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# =============================================================================
# Docker Compose with Nginx SSL Termination
# =============================================================================

# docker-compose.yml
version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/ssl/certs
    depends_on:
      - app
    networks:
      - app-network

  app:
    build: .
    environment:
      - NODE_ENV=production
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

# =============================================================================
# Environment Variables for Node.js App
# =============================================================================

# .env.production
NODE_ENV=production
SESSION_SECRET=your-super-secret-session-key-change-in-production
DB_HOST=your-db-host
DB_USER=your-db-user
DB_PASSWORD=your-db-password
DB_NAME=your-db-name
REDIS_URL=redis://redis:6379
COOKIE_DOMAIN=.your-domain.com

# =============================================================================
# AWS ALB Health Check Configuration
# =============================================================================

# Health check path: /health
# Protocol: HTTP
# Port: 80 (traffic port)
# Healthy threshold: 2
# Unhealthy threshold: 2
# Timeout: 5 seconds
# Interval: 30 seconds
# Success codes: 200

# =============================================================================
# GCP Load Balancer Health Check
# =============================================================================

# Health check path: /health
# Protocol: HTTP
# Port: 8080 (or your service port)
# Check interval: 30 seconds
# Timeout: 5 seconds
# Healthy threshold: 2
# Unhealthy threshold: 2
# Success codes: 200-399

