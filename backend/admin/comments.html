<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudade Market Admin - Comments Moderation</title>
    <link rel="stylesheet" href="dist/admin-tailwind.css">
    <script src="/js/i18n.js"></script>
    <script src="admin-icons.js"></script>
    <script src="sidebar.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans">
    <div class="min-h-screen flex overflow-hidden bg-slate-50">
        <div class="sidebar shrink-0 bg-slate-950" id="sidebar"></div>

        <div class="content ml-[260px] w-[calc(100%-260px)] flex flex-col">
            <header class="border-b border-slate-200 bg-white px-6 py-5">
                <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                    <div>
                        <h1 class="text-3xl font-bold tracking-tight text-slate-900">Comments</h1>
                        <p class="mt-2 text-sm text-slate-600">Moderate user reviews and comments across the store.</p>
                    </div>
                    <div class="flex flex-wrap items-center gap-3">
                        <button id="bulkApproveBtn" class="inline-flex items-center justify-center rounded-2xl bg-emerald-600 px-5 py-3 text-sm font-semibold text-white shadow-sm hover:bg-emerald-700 transition">Bulk Approve</button>
                        <button id="bulkRejectBtn" class="inline-flex items-center justify-center rounded-2xl bg-rose-600 px-5 py-3 text-sm font-semibold text-white shadow-sm hover:bg-rose-700 transition">Bulk Reject</button>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-6">
                <div class="rounded-[32px] border border-slate-200 bg-white shadow-sm overflow-hidden">
                    <div class="border-b border-slate-200 p-6">
                        <div class="grid gap-4 lg:grid-cols-[1.8fr_1fr] items-end">
                            <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
                                <div>
                                    <label for="productFilter" class="block text-sm font-semibold text-slate-700 mb-2">Product</label>
                                    <select id="productFilter" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 focus:border-sky-500 focus:ring-1 focus:ring-sky-500/20">
                                        <option value="">All</option>
                                    </select>
                                </div>
                                <div>
                                    <label for="statusFilter" class="block text-sm font-semibold text-slate-700 mb-2">Status</label>
                                    <select id="statusFilter" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 focus:border-sky-500 focus:ring-1 focus:ring-sky-500/20">
                                        <option value="">All</option>
                                        <option value="pending">Pending</option>
                                        <option value="approved">Approved</option>
                                        <option value="rejected">Rejected</option>
                                    </select>
                                </div>
                                <div class="flex items-end">
                                    <button id="applyFilterBtn" class="w-full inline-flex items-center justify-center rounded-2xl bg-sky-600 px-5 py-3 text-sm font-semibold text-white shadow-sm hover:bg-sky-700 transition">Apply Filters</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="overflow-x-auto p-6">
                        <div class="rounded-[32px] border border-slate-100 bg-white shadow-sm overflow-hidden">
                            <table class="min-w-[900px] w-full divide-y divide-slate-200 text-sm">
                                <thead class="bg-slate-100 text-slate-700">
                                    <tr>
                                        <th class="px-4 py-4 text-left font-semibold uppercase tracking-[0.18em]"><input type="checkbox" id="toggleAll" class="h-4 w-4 rounded border-slate-300 text-sky-600 focus:ring-sky-500" /></th>
                                        <th class="px-4 py-4 text-left font-semibold uppercase tracking-[0.18em]">ID</th>
                                        <th class="px-4 py-4 text-left font-semibold uppercase tracking-[0.18em]">Product</th>
                                        <th class="px-4 py-4 text-left font-semibold uppercase tracking-[0.18em]">User</th>
                                        <th class="px-4 py-4 text-left font-semibold uppercase tracking-[0.18em]">Rating</th>
                                        <th class="px-4 py-4 text-left font-semibold uppercase tracking-[0.18em]">Comment</th>
                                        <th class="px-4 py-4 text-left font-semibold uppercase tracking-[0.18em]">Status</th>
                                        <th class="px-4 py-4 text-left font-semibold uppercase tracking-[0.18em]">Created</th>
                                        <th class="px-4 py-4 text-left font-semibold uppercase tracking-[0.18em]">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="commentsBody" class="divide-y divide-slate-200 bg-white"></tbody>
                            </table>
                        </div>
                    </div>

                    <div id="emptyComments" class="hidden rounded-[32px] bg-slate-50 px-6 py-10 text-center text-sm text-slate-500">No comments found for current filters.</div>

                    <div class="mt-6 flex flex-wrap items-center gap-3 border-t border-slate-200 bg-slate-50 px-6 py-4">
                        <button id="prevPage" class="inline-flex items-center justify-center rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 transition">Previous</button>
                        <span id="pageInfo" class="text-sm text-slate-600">Page 1</span>
                        <button id="nextPage" class="inline-flex items-center justify-center rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 transition">Next</button>
                        <div class="ml-auto flex items-center gap-3 text-sm text-slate-600">
                            <span>Per page:</span>
                            <select id="perPageSelect" class="rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 focus:border-sky-500 focus:ring-1 focus:ring-sky-500/20">
                                <option value="10">10</option>
                                <option value="15" selected>15</option>
                                <option value="25">25</option>
                                <option value="50">50</option>
                            </select>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let perPage = 15;
        const state = { selectedIds: new Set() };

        async function checkAuth() {
            const token = localStorage.getItem('adminToken');
            if (!token) { window.location.href = 'login.html'; return false; }
            return true;
        }

        async function loadProductsForFilter() {
            try {
                const token = localStorage.getItem('adminToken');
                const res = await fetch('/api/products', { headers: { Authorization: `Bearer ${token}` } });
                if (!res.ok) throw new Error('Failed to load products');
                const list = await res.json();
                const sel = document.getElementById('productFilter');
                sel.innerHTML = '<option value="">All</option>' + list.map(p => `<option value="${p.id}">${p.name_en || p.name_fr || p.name_pt || 'ID '+p.id}</option>`).join('');
            } catch (err) {
                console.error('Product list load error', err);
            }
        }

        async function loadComments() {
            const status = document.getElementById('statusFilter').value;
            const productId = document.getElementById('productFilter').value;
            const token = localStorage.getItem('adminToken');
            const searchParams = new URLSearchParams();
            if (status) searchParams.set('status', status);
            if (productId) searchParams.set('product_id', productId);
            searchParams.set('page', currentPage);
            searchParams.set('per_page', perPage);

            try {
                const res = await fetch(`/api/comments?${searchParams.toString()}`, { headers: { Authorization: `Bearer ${token}` } });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                const body = document.getElementById('commentsBody');
                const empty = document.getElementById('emptyComments');
                const toggleAll = document.getElementById('toggleAll');

                if (!Array.isArray(data.comments) || data.comments.length === 0) {
                    body.innerHTML = '';
                    empty.style.display = 'block';
                    document.getElementById('pageInfo').innerText = `Page ${currentPage} (0 of 0)`;
                    toggleAll.checked = false;
                    state.selectedIds.clear();
                    return;
                }

                empty.style.display = 'none';
                const totalPages = Math.max(1, Math.ceil(data.total / perPage));

                body.innerHTML = data.comments.map(comment => {
                    const isChecked = state.selectedIds.has(comment.id);
                    return `
                        <tr>
                            <td><input type="checkbox" class="comment-checkbox" data-id="${comment.id}" ${isChecked ? 'checked' : ''}></td>
                            <td>${comment.id}</td>
                            <td>${comment.product_name || '–'}</td>
                            <td>${comment.user_username || comment.user_email || '–'}</td>
                            <td>${comment.rating != null ? comment.rating : '–'}</td>
                            <td>${(comment.body || '').replace(/\n/g,'<br>')}</td>
                            <td>${comment.status || 'pending'}</td>
                            <td>${new Date(comment.created_at).toLocaleString()}</td>
                            <td>
                                ${comment.status === 'pending' || !comment.status ? `
                                    <button class="btn btn-success comment-action-btn" data-action="approved" data-id="${comment.id}">Approve</button>
                                    <button class="btn btn-danger comment-action-btn" data-action="rejected" data-id="${comment.id}">Reject</button>
                                ` : '—'}
                            </td>
                        </tr>
                    `;
                }).join('');

                document.getElementById('pageInfo').innerText = `Page ${data.page} of ${totalPages}`;
                toggleAll.checked = body.querySelectorAll('input.comment-checkbox:checked').length === data.comments.length;

                document.querySelectorAll('.comment-checkbox').forEach(ch => {
                    ch.addEventListener('change', () => {
                        const commentId = Number(ch.dataset.id);
                        if (ch.checked) state.selectedIds.add(commentId);
                        else state.selectedIds.delete(commentId);
                    });
                });

                document.querySelectorAll('.comment-action-btn').forEach(button => {
                    button.addEventListener('click', () => {
                        const id = Number(button.dataset.id);
                        const action = button.dataset.action;
                        updateStatus(id, action);
                    });
                });

                document.getElementById('prevPage').disabled = currentPage <= 1;
                document.getElementById('nextPage').disabled = currentPage >= totalPages;
            } catch(e) {
                console.error('Comment load failed', e);
            }
        }

        async function updateStatus(id, status) {
            const token = localStorage.getItem('adminToken');
            try {
                const res = await fetch(`/api/comments/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ status })
                });
                if (!res.ok) throw new Error('Failed to update');
                await loadComments();
            } catch (err) {
                console.error('Update status failed', err);
                alert('Unable to update review status');
            }
        }

        async function bulkUpdate(status) {
            if (state.selectedIds.size === 0) {
                return alert('Select at least one review');
            }
            const ids = Array.from(state.selectedIds);
            for (const id of ids) {
                await updateStatus(id, status);
            }
            state.selectedIds.clear();
            await loadComments();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!(await checkAuth())) return;
            await loadProductsForFilter();
            await loadComments();

            document.getElementById('applyFilterBtn').addEventListener('click', () => { currentPage = 1; loadComments(); });
            document.getElementById('prevPage').addEventListener('click', () => { currentPage = Math.max(1, currentPage - 1); loadComments(); });
            document.getElementById('nextPage').addEventListener('click', () => { currentPage += 1; loadComments(); });
            document.getElementById('perPageSelect').addEventListener('change', (e) => { perPage = Number(e.target.value); currentPage = 1; loadComments(); });
            document.getElementById('bulkApproveBtn').addEventListener('click', () => bulkUpdate('approved'));
            document.getElementById('bulkRejectBtn').addEventListener('click', () => bulkUpdate('rejected'));
            document.getElementById('toggleAll').addEventListener('change', (e) => {
                const checkboxes = document.querySelectorAll('.comment-checkbox');
                checkboxes.forEach(ch => {
                    ch.checked = e.target.checked;
                    const id = Number(ch.dataset.id);
                    if (e.target.checked) state.selectedIds.add(id);
                    else state.selectedIds.delete(id);
                });
            });

            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('adminToken');
                localStorage.removeItem('adminUsername');
                window.location.href = 'login.html';
            });
            document.querySelectorAll('.sidebar-item').forEach(item => {
                if (item.dataset.section === 'comments') item.classList.add('active'); else item.classList.remove('active');
            });
        });
    </script>
</body>
</html>
