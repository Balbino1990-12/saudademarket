<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudade Market Admin - Support Chats</title>
    <link rel="stylesheet" href="dist/admin-tailwind.css">
    <script src="admin-icons.js"></script>
    <script src="sidebar.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans">
    <div class="min-h-screen flex bg-slate-50">
        <div id="sidebar" class="sidebar w-[260px] shrink-0"></div>

        <div class="content ml-[260px] w-[calc(100%-260px)] flex flex-col">
            <header class="border-b border-slate-200 bg-white px-6 py-5">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight">Support Chats</h1>
                        <p class="mt-1 text-sm text-slate-600">List, view and take over user conversations.</p>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-6">
                <div class="grid grid-cols-4 gap-6">
                    <aside class="col-span-1 bg-white rounded-xl border p-4">
                        <h3 class="font-semibold mb-3">Active Conversations</h3>
                        <div id="chatList" class="space-y-2 text-sm text-slate-700">
                            Loading...
                        </div>
                    </aside>

                    <section class="col-span-3 bg-white rounded-xl border p-4 flex flex-col">
                        <div class="flex items-center justify-between mb-3">
                            <div>
                                <h2 id="chatTitle" class="text-xl font-semibold">Select a conversation</h2>
                                <div id="chatMeta" class="text-xs text-slate-500">No chat selected</div>
                            </div>
                            <div>
                                <button id="btnJoinSupport" class="px-3 py-1 rounded bg-indigo-600 text-white">Join Support</button>
                                <button id="btnTakeOver" class="px-3 py-1 rounded bg-emerald-600 text-white">Take Over</button>
                            </div>
                        </div>

                        <div id="conversation" class="flex-1 overflow-auto border rounded p-3 bg-gray-50">
                            <div id="messagesArea" class="space-y-3 text-sm text-slate-800">No conversation selected</div>
                        </div>

                        <form id="agentForm" class="mt-3 flex gap-3" onsubmit="return false;">
                            <input id="agentInput" class="flex-1 rounded border px-3 py-2" placeholder="Type message to user..." />
                            <button id="agentSend" class="px-4 py-2 rounded bg-indigo-600 text-white">Send</button>
                        </form>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="support-chats.js"></script>
</body>
</html>
