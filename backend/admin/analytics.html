<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics - Saudade Market Admin</title>
    <link rel="stylesheet" href="dist/admin-tailwind.css" />
    <style>
      html, body {
        overflow: auto !important;
      }
      body {
        min-height: 100%;
      }
      .content {
        min-height: 100vh;
      }
      main {
        min-height: calc(100vh - 6rem);
      }
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 50;
        background: rgba(15, 23, 42, 0.45);
        backdrop-filter: blur(6px);
        justify-content: center;
        align-items: center;
        padding: 1.5rem;
      }
      .modal.active {
        display: flex;
      }
      .modal-content {
        max-width: 760px;
        width: min(100%, 760px);
        max-height: 88vh;
        overflow-y: auto;
        background: rgba(255, 255, 255, 0.98);
        border-radius: 1.75rem;
        box-shadow: 0 35px 80px rgba(15, 23, 42, 0.25);
        border: 1px solid rgba(148, 163, 184, 0.18);
        backdrop-filter: saturate(180%) blur(12px);
        animation: modalEnter 220ms ease;
      }
      @keyframes modalEnter {
        from { opacity: 0; transform: translateY(-12px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        border-bottom: 1px solid #e2e8f0;
        padding: 1.5rem 1.75rem;
      }
      .modal-header h3 {
        margin: 0;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
      }
      .modal-close {
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 9999px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: #fff;
        color: #334155;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 1.2rem;
        transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
      }
      .modal-close:hover {
        background: #f8fafc;
        color: #0f172a;
        transform: scale(1.03);
      }
      .modal-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1.25rem;
        padding: 1.75rem;
      }
      .modal-grid dt {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #64748b;
        margin-bottom: 0.5rem;
      }
      .modal-grid dd {
        margin: 0;
        font-size: 0.95rem;
        color: #0f172a;
      }
      .modal-content > .modal-grid + div {
        padding: 0 1.75rem 1.75rem;
      }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans">
    <div id="adminHeader" data-header-title="Analytics" class="admin-header-placeholder"></div>
    <div class="min-h-screen flex bg-slate-50">
        <div id="sidebar" class="sidebar w-[260px] shrink-0"></div>
        <div class="content ml-[260px] w-[calc(100%-260px)] flex flex-col">
            <main class="flex-1 overflow-y-auto p-6">
                <section class="rounded-[32px] border border-slate-200 bg-white shadow-sm p-6">
                    <div class="grid gap-4 xl:grid-cols-[1fr_260px]">
                        <div class="rounded-[32px] border border-slate-200 bg-white p-6 shadow-sm">
                            <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                                <div>
                                    <h2 class="text-xl font-semibold text-slate-900">Analytics overview</h2>
                                    <p class="mt-2 text-sm text-slate-500">Track website traffic, sessions, and bounce rate.</p>
                                </div>
                            </div>

                            <div class="mt-6 grid gap-4 sm:grid-cols-3">
                                <div class="rounded-[28px] border border-slate-200 bg-slate-50 p-5">
                                    <div class="text-sm font-semibold uppercase tracking-[0.18em] text-slate-500">Page views</div>
                                    <div id="totalPageViews" class="mt-3 text-3xl font-semibold text-slate-900">0</div>
                                </div>
                                <div class="rounded-[28px] border border-slate-200 bg-slate-50 p-5">
                                    <div class="text-sm font-semibold uppercase tracking-[0.18em] text-slate-500">Unique visitors</div>
                                    <div id="uniqueVisitors" class="mt-3 text-3xl font-semibold text-slate-900">0</div>
                                </div>
                                <div class="rounded-[28px] border border-slate-200 bg-slate-50 p-5">
                                    <div class="text-sm font-semibold uppercase tracking-[0.18em] text-slate-500">Bounce rate</div>
                                    <div id="bounceRate" class="mt-3 text-3xl font-semibold text-slate-900">0%</div>
                                </div>
                            </div>
                        </div>

                        <div class="rounded-[32px] border border-slate-200 bg-white p-6 shadow-sm">
                            <h3 class="text-lg font-semibold text-slate-900">Filters</h3>
                            <p class="mt-2 text-sm text-slate-500">Refine your analytics by date range and event type.</p>
                        </div>
                    </div>

                    <div class="rounded-[32px] border border-slate-200 bg-white shadow-sm overflow-hidden mt-6">
                        <div class="grid gap-4 p-6 md:grid-cols-[1fr_auto] md:items-end">
                            <div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-[minmax(260px,1fr)_minmax(240px,280px)]">
                                <label class="block">
                                    <span class="text-sm font-semibold text-slate-700">Start Date</span>
                                    <input id="startDate" type="date" class="mt-2 w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500/20">
                                </label>
                                <label class="block">
                                    <span class="text-sm font-semibold text-slate-700">End Date</span>
                                    <input id="endDate" type="date" class="mt-2 w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500/20">
                                </label>
                            </div>
                            <div class="grid gap-4 items-end">
                                <label class="block">
                                    <span class="text-sm font-semibold text-slate-700">Event Type</span>
                                    <select id="eventType" class="mt-2 w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500/20">
                                        <option value="">All events</option>
                                        <option value="page_view">Page views</option>
                                        <option value="session_start">Session starts</option>
                                        <option value="session_end">Session ends</option>
                                    </select>
                                </label>
                                <button id="applyFiltersBtn" class="inline-flex items-center justify-center rounded-2xl bg-slate-100 px-5 py-3 text-sm font-semibold text-slate-900 transition hover:bg-slate-200">Apply filters</button>
                            </div>
                        </div>

                        <div class="overflow-x-auto">
                            <table id="analyticsTable" class="min-w-[1020px] w-full text-sm divide-y divide-slate-200">
                                <thead class="bg-slate-100 text-slate-700">
                                    <tr>
                                        <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-[0.18em]">Event Type</th>
                                        <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-[0.18em]">Visitor ID</th>
                                        <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-[0.18em]">Session ID</th>
                                        <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-[0.18em]">URL</th>
                                        <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-[0.18em]">Referrer</th>
                                        <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-[0.18em]">User Agent</th>
                                        <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-[0.18em]">Timestamp</th>
                                    </tr>
                                </thead>
                                <tbody id="analyticsTableBody" class="divide-y divide-slate-200 bg-white">
                                    <tr>
                                        <td colspan="7" class="px-5 py-10 text-center text-slate-500">Loading analytics data...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between px-6 py-4">
                            <div id="analyticsCountText" class="text-sm text-slate-500">Showing 0 of 0 records</div>
                            <div class="flex items-center gap-3 text-sm text-slate-600">
                                <label for="analyticsPerPageSelect" class="font-medium">Rows per page</label>
                                <select id="analyticsPerPageSelect" class="rounded-2xl border border-slate-300 bg-white px-4 py-2 text-sm text-slate-900 outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500/20">
                                    <option value="10">10</option>
                                    <option value="20">20</option>
                                    <option value="50">50</option>
                                </select>
                            </div>
                        </div>
                        <div id="pagination" class="flex flex-wrap justify-center gap-2 my-5 px-6"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="admin-header.js"></script>
    <script src="sidebar.js"></script>
    <script src="analytics.js"></script>
</body>
</html>
