<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudade Market Admin - Consumers</title>
    <link rel="stylesheet" href="dist/admin-tailwind.css">
    <style>
      html, body {
        overflow: auto !important;
      }
      body {
        min-height: 100%;
      }
      .content {
        min-height: 100vh;
      }
      main {
        min-height: calc(100vh - 6rem);
      }
    </style>
    <script src="/js/i18n.js"></script>
    <script src="admin-icons.js"></script>
    <script src="sidebar.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans">
    <div class="min-h-screen flex bg-slate-50">
        <div id="sidebar" class="sidebar w-[260px] shrink-0"></div>

        <div class="content ml-[260px] w-[calc(100%-260px)] flex flex-col">
            <header class="border-b border-slate-200 bg-white px-6 py-5">
                <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                    <div>
                        <h1 class="text-3xl font-bold tracking-tight text-slate-900">Consumers</h1>
                        <p class="mt-2 text-sm text-slate-600">All registered buyers in the system.</p>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-6">
                <div class="rounded-[32px] border border-slate-200 bg-white shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table id="consumersTable" class="min-w-[600px] w-full text-sm divide-y divide-slate-200">
                            <thead class="bg-slate-100 text-slate-700">
                                <tr>
                                    <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-[0.18em]">Username</th>
                                    <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-[0.18em]">Email</th>
                                    <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-[0.18em]">Name</th>
                                    <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-[0.18em]">Phone</th>
                                    <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-[0.18em]">City</th>
                                    <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-[0.18em]">Last Login</th>
                                    <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-[0.18em]">Status</th>
                                </tr>
                            </thead>
                            <tbody id="consumersTableBody" class="divide-y divide-slate-200 bg-white">
                                <tr>
                                    <td colspan="7" class="px-5 py-8 text-center text-slate-600">Loading consumers...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>


    <script>
        async function loadConsumers() {
            try {
                const token = localStorage.getItem('adminToken');
                if (!token) {
                    window.location.href = 'login.html';
                    return;
                }

                const response = await fetch('/api/admin/consumers', {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'x-admin-token': token
                    }
                });

                if (!response.ok) {
                    let errorText = `Failed to load consumers: ${response.status}`;
                    try {
                        const errorBody = await response.json();
                        if (errorBody && errorBody.error) {
                            errorText += ` - ${errorBody.error}`;
                        } else if (errorBody && errorBody.message) {
                            errorText += ` - ${errorBody.message}`;
                        }
                    } catch (jsonErr) {
                        const textBody = await response.text();
                        if (textBody) {
                            errorText += ` - ${textBody}`;
                        }
                    }
                    throw new Error(errorText);
                }

                const result = await response.json();
                if (!result.success || !Array.isArray(result.data)) {
                    throw new Error('Invalid data returned');
                }

                renderConsumers(result.data);
            } catch (err) {
                console.error(err);
                const tbody = document.getElementById('consumersTableBody');
                tbody.innerHTML = `<tr><td colspan="7" class="px-5 py-8 text-center text-red-600">Unable to load consumers: ${err.message}</td></tr>`;
            }
        }

        function formatLastLogin(lastLogin) {
            if (!lastLogin) return '';
            const date = new Date(lastLogin);
            if (isNaN(date.getTime())) return '';
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function renderConsumers(consumers) {
            const tbody = document.getElementById('consumersTableBody');
            if (!consumers || consumers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-5 py-8 text-center text-slate-600">No consumers found</td></tr>`;
                return;
            }

            tbody.innerHTML = consumers.map(user => {
                const fullName = `${user.first_name || ''} ${user.last_name || ''}`.trim() || 'N/A';
                const phone = user.phone_number || '-';
                const city = user.city || '-';
                const lastLogin = formatLastLogin(user.last_login);
                const statusBgClass = user.active ? 'bg-emerald-50' : 'bg-rose-50';
                const statusTextClass = user.active ? 'text-emerald-700' : 'text-rose-700';
                const statusText = user.active ? 'Active' : 'Inactive';
                return `
                    <tr class="hover:bg-slate-50">
                        <td class="px-5 py-4">${user.username || '-'}</td>
                        <td class="px-5 py-4">${user.email || '-'}</td>
                        <td class="px-5 py-4">${fullName}</td>
                        <td class="px-5 py-4">${phone}</td>
                        <td class="px-5 py-4">${city}</td>
                        <td class="px-5 py-4 text-slate-500">${lastLogin}</td>
                        <td class="px-5 py-4"><span class="inline-flex items-center gap-1 rounded-full px-3 py-1 text-sm font-medium ${statusBgClass} ${statusTextClass}">${statusText}</span></td>
                    </tr>
                `;
            }).join('');
        }

        function checkAuth() {
            const token = localStorage.getItem('adminToken');
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }

        // Load consumers on page load
        loadConsumers();

        document.addEventListener('DOMContentLoaded', () => {
            if (!checkAuth()) return;
            loadConsumers();
        });
    </script>
</body>
</html>
