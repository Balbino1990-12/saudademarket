<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Management - Saudade Market Admin</title>
    <link rel="stylesheet" href="dist/admin-tailwind.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c41e1e;
            --primary-dark: #8a1515;
            --secondary: #2c3e50;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --info: #17a2b8;
            --light: #f8f9fa;
            --dark: #1a1a1a;
            --white: #ffffff;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-400: #ced4da;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --gray-700: #495057;
            --bg-light: #f5f6f8;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.15);
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--dark);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: inherit;
        }

        .logo-section img {
            height: 42px;
            width: auto;
            object-fit: contain;
        }

        .logo-text h1 {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--primary);
            margin: 0;
        }

        .logo-text p {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--gray-600);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--gray-100);
            color: var(--dark);
        }

        .btn-secondary:hover {
            background: var(--gray-200);
        }

        .container {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        .sidebar {
            width: 280px;
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            padding: 24px;
            overflow-y: auto;
        }

        .content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark);
        }

        .form-card {
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .table-container {
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f1f3 100%);
        }

        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
            color: var(--gray-700);
        }

        th {
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        tbody tr:hover {
            background: var(--gray-100);
        }

        .expense-category {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--white);
            min-width: 70px;
        }

        .category-cogs { background: var(--info); }
        .category-shipping { background: var(--warning); }
        .category-marketing { background: var(--success); }
        .category-rent { background: var(--danger); }
        .category-other { background: var(--secondary); }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 8px 14px;
            font-size: 0.82rem;
            border-radius: 8px;
        }

        .btn-edit {
            background: var(--info);
            color: var(--white);
        }

        .btn-delete {
            background: var(--danger);
            color: var(--white);
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .summary-card {
            background: var(--white);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }

        .summary-card h4 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gray-600);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .summary-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--dark);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--dark);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray-500);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.1);
            color: var(--success);
            border: 1px solid rgba(40, 167, 69, 0.2);
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.1);
            color: var(--danger);
            border: 1px solid rgba(220, 53, 69, 0.2);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="/admin" class="logo-section">
                <img src="/images/Saudade_market.png" alt="Saudade Market" />
                <div class="logo-text">
                    <h1>Saudade Market</h1>
                    <p>Admin Panel</p>
                </div>
            </a>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="window.location.href='/admin'">← Back to Dashboard</button>
            <button class="btn btn-primary" id="addExpenseBtn">+ Add Expense</button>
        </div>
    </div>

    <div class="container">
        <div class="content">
            <div class="page-header">
                <h1 class="page-title">Expense Management</h1>
            </div>

            <div id="alertContainer"></div>

            <div class="summary-cards" id="summaryCards">
                <div class="summary-card">
                    <h4>Total Expenses</h4>
                    <div class="summary-value" id="totalExpenses">€0.00</div>
                </div>
                <div class="summary-card">
                    <h4>This Month</h4>
                    <div class="summary-value" id="monthlyExpenses">€0.00</div>
                </div>
                <div class="summary-card">
                    <h4>Top Category</h4>
                    <div class="summary-value" id="topCategory">-</div>
                </div>
            </div>

            <div class="table-container">
                <table id="expensesTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Amount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="expensesTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 40px; color: var(--gray-500);">
                                Loading expenses...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Expense Modal -->
    <div class="modal" id="expenseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add Expense</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form id="expenseForm">
                <div class="form-group">
                    <label class="form-label" for="expenseCategory">Category</label>
                    <select class="form-input" id="expenseCategory" required>
                        <option value="">Select Category</option>
                        <option value="cogs">Cost of Goods Sold</option>
                        <option value="shipping">Shipping</option>
                        <option value="marketing">Marketing</option>
                        <option value="rent">Rent/Utilities</option>
                        <option value="salaries">Salaries</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="expenseDescription">Description</label>
                    <input type="text" class="form-input" id="expenseDescription" placeholder="Enter expense description" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="expenseAmount">Amount (€)</label>
                        <input type="number" class="form-input" id="expenseAmount" step="0.01" min="0" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="expenseDate">Date</label>
                        <input type="date" class="form-input" id="expenseDate" required>
                    </div>
                </div>
                <div style="margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Save Expense</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentEditingId = null;

        // Load expenses on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadExpenses();
            loadExpenseSummary();

            // Set default date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('expenseDate').value = today;
        });

        // Modal controls
        document.getElementById('addExpenseBtn').addEventListener('click', () => {
            currentEditingId = null;
            document.getElementById('modalTitle').textContent = 'Add Expense';
            document.getElementById('expenseForm').reset();
            document.getElementById('expenseModal').classList.add('show');
        });

        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('expenseModal').classList.remove('show');
        });

        // Form submission
        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                category: document.getElementById('expenseCategory').value,
                description: document.getElementById('expenseDescription').value,
                amount: parseFloat(document.getElementById('expenseAmount').value),
                expenseDate: document.getElementById('expenseDate').value
            };

            try {
                const url = currentEditingId ? `/api/admin/expenses/${currentEditingId}` : '/api/admin/expenses';
                const method = currentEditingId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        ...getAuthHeaders()
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('Expense saved successfully!', 'success');
                    document.getElementById('expenseModal').classList.remove('show');
                    loadExpenses();
                    loadExpenseSummary();
                } else {
                    showAlert(result.error || 'Failed to save expense', 'error');
                }
            } catch (error) {
                console.error('Error saving expense:', error);
                showAlert('Failed to save expense', 'error');
            }
        });

        async function loadExpenses() {
            try {
                const response = await fetch('/api/admin/expenses', {
                    headers: getAuthHeaders()
                });

                const result = await response.json();

                if (result.success) {
                    renderExpensesTable(result.data);
                } else {
                    showAlert('Failed to load expenses', 'error');
                }
            } catch (error) {
                console.error('Error loading expenses:', error);
                showAlert('Failed to load expenses', 'error');
            }
        }

        async function loadExpenseSummary() {
            try {
                const response = await fetch('/api/admin/expenses/summary', {
                    headers: getAuthHeaders()
                });

                const result = await response.json();

                if (result.success) {
                    updateSummaryCards(result.data);
                }
            } catch (error) {
                console.error('Error loading expense summary:', error);
            }
        }

        function renderExpensesTable(expenses) {
            const tbody = document.getElementById('expensesTableBody');

            if (!expenses || expenses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: var(--gray-500);">No expenses found</td></tr>';
                return;
            }

            tbody.innerHTML = expenses.map(expense => `
                <tr>
                    <td>${formatDate(expense.expense_date)}</td>
                    <td><span class="expense-category category-${expense.category}">${formatCategory(expense.category)}</span></td>
                    <td>${expense.description}</td>
                    <td>€${expense.amount.toFixed(2)}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-sm btn-edit" onclick="editExpense(${expense.id})">Edit</button>
                            <button class="btn btn-sm btn-delete" onclick="deleteExpense(${expense.id})">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function updateSummaryCards(summary) {
            document.getElementById('totalExpenses').textContent = `€${summary.totalExpenses.toFixed(2)}`;

            // Calculate this month's expenses
            const thisMonth = new Date();
            thisMonth.setDate(1);
            const monthlyExpenses = summary.expenseTrend
                .filter(item => new Date(item.period) >= thisMonth)
                .reduce((sum, item) => sum + item.total_expenses, 0);

            document.getElementById('monthlyExpenses').textContent = `€${monthlyExpenses.toFixed(2)}`;

            // Find top category
            if (summary.expensesByCategory && summary.expensesByCategory.length > 0) {
                const topCategory = summary.expensesByCategory[0];
                document.getElementById('topCategory').textContent = formatCategory(topCategory.category);
            } else {
                document.getElementById('topCategory').textContent = '-';
            }
        }

        function editExpense(id) {
            // Find expense data (you might want to store it or fetch individually)
            // For now, we'll implement a simple version
            currentEditingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Expense';
            // You would populate the form with existing data here
            document.getElementById('expenseModal').classList.add('show');
        }

        async function deleteExpense(id) {
            if (!confirm('Are you sure you want to delete this expense?')) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/expenses/${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('Expense deleted successfully!', 'success');
                    loadExpenses();
                    loadExpenseSummary();
                } else {
                    showAlert(result.error || 'Failed to delete expense', 'error');
                }
            } catch (error) {
                console.error('Error deleting expense:', error);
                showAlert('Failed to delete expense', 'error');
            }
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString();
        }

        function formatCategory(category) {
            const categoryNames = {
                'cogs': 'COGS',
                'shipping': 'Shipping',
                'marketing': 'Marketing',
                'rent': 'Rent/Utilities',
                'salaries': 'Salaries',
                'other': 'Other'
            };
            return categoryNames[category] || category;
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }

        function getAuthHeaders() {
            const token = localStorage.getItem('adminToken');
            if (!token) return {};
            return { 'Authorization': `Bearer ${token}` };
        }
    </script>
</body>
</html>
