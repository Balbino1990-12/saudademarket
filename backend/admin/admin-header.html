<header class="sticky top-0 z-30 border-b border-slate-200 bg-white shadow-sm">
    <div class="mx-auto flex flex-col gap-3 px-4 py-3 md:flex-row md:items-center md:justify-between max-w-screen-2xl">
        <div class="flex items-center gap-3">
            <button id="menuToggle" type="button" aria-label="Toggle sidebar" class="inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-slate-50 text-slate-700 transition hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500/30">
                <span class="text-xl">☰</span>
            </button>
            <a href="/admin/index.html" class="flex items-center gap-3 text-slate-900 no-underline">
                <img src="/images/Saudade_market.png" alt="Saudade Market logo" class="h-10 w-auto rounded-full" />
                <div class="hidden flex-col leading-tight md:flex">
                    <span class="text-xs uppercase tracking-[0.24em] text-slate-500">Saudade Market</span>
                    <span class="text-sm font-semibold text-slate-900">Admin</span>
                </div>
            </a>
        </div>

        <div class="flex flex-col items-start justify-center text-center md:items-center">
            <span id="pageTitle" class="text-base font-semibold text-slate-900">Dashboard</span>
            <span id="headerDate" class="text-sm text-slate-500">Thursday, April 30, 2026</span>
        </div>

        <div class="flex flex-wrap items-center gap-2 justify-end">
            <button type="button" aria-label="Messages" class="inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-slate-50 text-slate-700 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500/30">
                ✉️
            </button>
            <div class="relative">
                <button id="notificationBtn" type="button" aria-label="View notifications" aria-controls="notificationPopover" class="inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-slate-50 text-slate-700 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500/30">
                    🔔
                </button>
                <span id="notificationBadge" class="hidden absolute -right-1 -top-1 inline-flex h-5 min-w-[1.25rem] items-center justify-center rounded-full bg-rose-500 px-1.5 text-[10px] font-semibold text-white">0</span>
                <div id="notificationPopover" class="hidden absolute right-0 z-40 mt-2 w-[22rem] overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-lg" role="region" aria-label="Notifications">
                    <div class="px-4 py-3 text-sm font-semibold text-slate-900" data-i18n="admin.notifications">Notifications</div>
                    <ul id="notificationList" class="divide-y divide-slate-200">
                        <li id="notificationPlaceholder" class="px-4 py-3 text-sm text-slate-500" data-i18n="admin.notifications.empty">No new notifications</li>
                    </ul>
                </div>
            </div>
            <div class="relative lang-selector">
                <button id="langBtn" type="button" aria-haspopup="true" aria-expanded="false" class="lang-toggle inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500/30">
                    EN
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <button type="button" class="lang-option active" data-lang="en">English</button>
                    <button type="button" class="lang-option" data-lang="fr">Français</button>
                    <button type="button" class="lang-option" data-lang="pt">Português</button>
                </div>
            </div>
            <div class="relative">
                <button id="profileBtn" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="profileMenu" class="inline-flex items-center gap-3 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-900 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500/30">
                    <span id="userAvatar" class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-sky-600 text-white">A</span>
                    <span class="text-left">
                        <span id="userName" class="block text-sm">Admin</span>
                        <span class="block text-xs text-slate-500">Administrator</span>
                    </span>
                    <span class="text-slate-400">▾</span>
                </button>
                <div id="profileMenu" class="hidden absolute right-0 z-40 mt-2 w-48 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-lg">
                    <button type="button" class="profile-menu-item w-full px-4 py-3 text-left text-sm text-slate-700 hover:bg-slate-50" id="profileSettings" data-i18n="admin.profile">Profile</button>
                    <button type="button" class="profile-menu-item w-full px-4 py-3 text-left text-sm text-slate-700 hover:bg-slate-50 logout-item" id="logoutBtn" data-i18n="logout">Logout</button>
                </div>
            </div>
        </div>
    </div>
</header>
