<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - PortugalStore</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="public/css/style.css">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      margin: 0;
    }
    .checkout-container {
      max-width: 700px;
      margin: 40px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(60,60,90,0.12);
      padding: 32px;
    }
    .checkout-header {
      font-size: 2rem;
      font-weight: 700;
      color: #2d2d2d;
      margin-bottom: 24px;
      text-align: center;
    }
    .checkout-summary {
      font-size: 1.1rem;
      color: #2d2d2d;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .checkout-form label {
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
      display: block;
    }
    .checkout-form input, .checkout-form textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      margin-bottom: 16px;
      font-size: 1rem;
      background: #f9f9f9;
      transition: border-color 0.2s;
    }
    .checkout-form input:focus, .checkout-form textarea:focus {
      border-color: #a3a3ff;
      outline: none;
    }
    .checkout-form button {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(90deg, #a3a3ff 0%, #6e6ef6 100%);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .checkout-form button:hover {
      background: linear-gradient(90deg, #6e6ef6 0%, #a3a3ff 100%);
    }
    .checkout-message {
      font-size: 1rem;
      color: #2d2d2d;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="checkout-container">
    <div class="checkout-header">Checkout</div>
    <div class="checkout-summary" id="checkoutSummary"></div>
    <form class="checkout-form" id="checkoutForm">
      <label for="address">Shipping Address</label>
      <textarea id="address" name="address" required></textarea>
      <label for="notes">Order Notes (optional)</label>
      <textarea id="notes" name="notes"></textarea>
      <button type="submit">Place Order</button>
      <div class="checkout-message" id="checkoutMessage"></div>
    </form>
  </div>
  <script>
    async function fetchCartSummary() {
      const token = localStorage.getItem('buyerToken');
      if (!token) {
        window.location.href = '/user/login.html';
        return;
      }
      const res = await fetch('/api/cart', {
        method: 'GET',
        headers: {
          'Authorization': 'Bearer ' + token
        }
      });
      if (!res.ok) return;
      const cart = await res.json();
      let total = 0;
      cart.forEach(item => {
        total += item.price * item.quantity;
      });
      document.getElementById('checkoutSummary').textContent = 'Total: €' + total.toFixed(2);
    }

    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = localStorage.getItem('buyerToken');
      if (!token) {
        window.location.href = '/user/login.html';
        return;
      }
      const address = document.getElementById('address').value;
      const notes = document.getElementById('notes').value;
      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ address, notes })
        });
        if (!res.ok) throw new Error('Order failed');
        document.getElementById('checkoutMessage').textContent = 'Order placed successfully!';
        document.getElementById('checkoutForm').reset();
      } catch (err) {
        document.getElementById('checkoutMessage').textContent = 'Error placing order.';
      }
    });

    fetchCartSummary();
  </script>
</body>
</html>
