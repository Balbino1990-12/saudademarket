<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spécialités - Portugalsstore.fr</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/i18n.js"></script>
</head>
<body>
    <header>
        <div class="header-top">
            <div class="logo">
                <img src="/images/Saudade_market.png" alt="Saudade Market" />
                <div class="logo-text">
                    <h1>Saudade Market</h1>
                    <p>ÉPICERIE PORTUGAISE EN LIGNE</p>
                </div>
            </div>

            <div class="search">
                <input type="search" placeholder="Rechercher un produit..." aria-label="Rechercher" />
            </div>

            <div class="header-actions">
                <button class="icon cart" title="Panier">🛒<span class="badge">0</span></button>
                <div class="language-selector">
                    <button id="langBtn" class="lang-toggle">FR</button>
                    <div class="lang-dropdown">
                        <button data-lang="fr" class="lang-option active">FR</button>
                        <button data-lang="pt" class="lang-option">PT</button>
                        <button data-lang="en" class="lang-option">EN</button>
                    </div>
                </div>
                <button class="icon user" id="profileBtn" title="Compte" style="display:flex; align-items:center; gap:6px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span class="profile-label" id="profileLabel"></span>
                </button>
                <button class="menu-toggle" id="menuToggle" title="Menu" style="display:none">☰</button>
            </div>
        </div>

        <nav>
            <ul>
                <li><a href="index.html" data-i18n="nav.home">HOME</a></li>
                <li><a href="produits.html" data-i18n="nav.products">ALL PRODUCTS</a></li>
                <li><a href="specialites.html" data-i18n="nav.specialties" class="active">SPECIALTIES</a></li>
                <li><a href="apropos.html" data-i18n="nav.about">ABOUT</a></li>
                <li><a href="contact.html" data-i18n="nav.contact">CONTACT</a></li>
            </ul>
        </nav>
        <div id="profileDropdown" class="profile-dropdown" aria-hidden="true" style="display:none;"></div>
    </header>

    <main>
        <section style="padding: 24px 36px;">
            <h2 style="font-size: 1.8rem; margin-bottom: 16px; color: #111;" id="specialtyPageTitle">Nos Spécialités Portugaises</h2>
            <p id="specialtyPageDescription" style="font-size: 1rem; color: #666; margin-bottom: 24px;"></p>
            <div id="specialtyProductsGrid" class="products-grid" style="display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 16px;"></div>
        </section>
    </main>

    <script src="/js/script.js"></script>
</body>
</html>
