<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <title>Saudade Market</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        .product-list-with-sidebar {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            margin: 24px 36px;
        }

        .product-category-sidebar {
            flex: 0 0 300px;
            background: #f8fbff;
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: 0 16px 50px rgba(15, 23, 42, 0.1);
            padding: 22px;
            position: sticky;
            top: 120px;
            height: fit-content;
        }

        .product-category-sidebar h3 {
            margin: 0 0 18px 0;
            font-size: 1.15rem;
            font-weight: 800;
            color: #111827;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .sidebar-specialty-category-section {
            margin-top: 24px;
        }

        .sidebar-specialty-category-section .sidebar-subtitle {
            margin: 0 0 12px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #334155;
        }

        .sidebar-category-tree {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sidebar-category-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-category-button {
            width: 100%;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(148, 163, 184, 0.26);
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.05);
            text-align: left;
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.95rem;
            color: #0f172a;
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
            font-weight: 600;
        }

        .sidebar-category-button:hover {
            transform: translateY(-1px);
            background-color: #ffffff;
            border-color: rgba(59, 130, 246, 0.18);
        }

        .sidebar-category-button.active {
            background: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
            color: #ffffff;
            box-shadow: 0 18px 35px rgba(37, 99, 235, 0.18);
            border-color: transparent;
        }

        .sidebar-category-children {
            margin-left: 12px;
            border-left: 1px solid rgba(148, 163, 184, 0.18);
            padding-left: 12px;
            margin-top: 8px;
        }

        .product-list-main {
            flex: 1;
            min-width: 0;
        }

        .product-toolbar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            padding: 18px 24px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.1);
            margin-bottom: 16px;
        }

        .product-toolbar label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            color: #334155;
            font-weight: 700;
            white-space: nowrap;
        }

        .product-toolbar select {
            min-width: 170px;
            height: 48px;
            padding: 0 14px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 18px;
            background: #fff;
            color: #0f172a;
            font-size: 0.97rem;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        .product-toolbar select:hover {
            transform: translateY(-1px);
        }

        .product-toolbar select:focus {
            border-color: rgba(59, 130, 246, 0.7);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
        }

        .product-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
        }

        .product-list-with-sidebar {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .product-category-sidebar {
            flex: 0 0 300px;
            background: #f8fbff;
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: 0 16px 50px rgba(15, 23, 42, 0.1);
            padding: 22px;
            position: sticky;
            top: 120px;
            height: fit-content;
        }

        .product-category-sidebar h3 {
            margin: 0 0 18px 0;
            font-size: 1.15rem;
            font-weight: 800;
            color: #111827;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .sidebar-category-tree {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sidebar-category-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-category-button {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(148, 163, 184, 0.26);
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.05);
            text-align: left;
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.95rem;
            color: #0f172a;
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
            font-weight: 600;
        }

        .sidebar-category-button:hover {
            transform: translateY(-1px);
            background-color: #ffffff;
            border-color: rgba(59, 130, 246, 0.18);
        }

        .sidebar-category-button.active {
            background: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
            color: #ffffff;
            box-shadow: 0 18px 35px rgba(37, 99, 235, 0.18);
            border-color: transparent;
        }

        .sidebar-category-button.active:hover {
            transform: translateY(-1px);
        }

        .sidebar-category-button::after {
            content: '›';
            opacity: 0.45;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .sidebar-category-button.active::after {
            opacity: 0.8;
        }

        .sidebar-category-children {
            margin-left: 12px;
            border-left: 1px solid rgba(148, 163, 184, 0.18);
            padding-left: 12px;
            margin-top: 2px;
        }

        @media (max-width: 900px) {
            .product-list-with-sidebar {
                flex-direction: column;
                gap: 16px;
                margin: 24px 18px;
            }

            .product-category-sidebar {
                position: relative;
                top: 0;
                width: 100%;
            }
        }
    </style>
    <script src="/js/i18n.js"></script>
</head>
<body>
    <header>
        <div class="header-top">
            <div class="logo">
                <img src="/images/Saudade_market.png" alt="Saudade Market" />
                <div class="logo-text">
                    <h1>Saudade Market</h1>
                    <p>MERCADO PORTUGUÊS ONLINE</p>
                </div>
            </div>

            <div class="search">
                <input type="search" placeholder="Pesquisar um produto..." aria-label="Pesquisar" />
            </div>

            <div class="header-actions">
                <button class="icon user" id="profileBtn" title="Conta" style="display:flex; align-items:center; gap:6px;">
                    <svg class="profile-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span id="buyerUsername" style="font-weight:600;margin-left:6px;"></span>
                </button>

                <div class="lang">PT</div>
                <button class="menu-toggle" id="menuToggle" title="Menu" style="display:none">☰</button>
            </div>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">INÍCIO</a></li>
                <li><a href="produtos.html" class="active">PRODUTOS</a></li>
                <li><a href="especialidades.html">ESPECIALIDADES</a></li>
                <li><a href="vinhos-porto.html">VINHOS & PORTO</a></li>
                <li><a href="mercaria.html">MERCARIA</a></li>
                <li><a href="cabazes.html">CABAZES</a></li>
                <li><a href="sobre.html">SOBRE NÓS</a></li>
                <li><a href="contactos.html">CONTACTOS</a></li>
            </ul>
        </nav>
        <div id="profileDropdown" class="profile-dropdown" aria-hidden="true" style="display:none;"></div>
    </header>

    <main>
        <h1>Produtos</h1>
        <div class="product-list-with-sidebar">
            <aside class="product-category-sidebar">
                <h3>Categorias</h3>
                <div id="productCategorySidebarTree" class="sidebar-category-tree"></div>
            </aside>
            <div class="product-list-main">
                <div class="product-toolbar" id="productToolbar">
                    <div class="toolbar-group">
                        <label for="productFilter">Filtrar por
                            <select id="productFilter">
                                <option value="all">Todos</option>
                                <option value="in_stock">Em estoque</option>
                                <option value="out_of_stock">Fora de estoque</option>
                            </select>
                        </label>
                        <label for="productCategoryFilter">Categoria
                            <select id="productCategoryFilter">
                                <option value="all">Todas categorias</option>
                            </select>
                        </label>
                    </div>
                    <div class="toolbar-group">
                        <label for="productSort">Ordenar por
                            <select id="productSort">
                                <option value="price_asc">Preço crescente</option>
                                <option value="price_desc">Preço decrescente</option>
                                <option value="rating_desc">Melhores avaliações</option>
                                <option value="stock_desc">Maior estoque</option>
                            </select>
                        </label>
                    </div>
                </div>
                <section class="product-list" id="productList"></section>
                <div id="paginationControls" class="pagination-controls"></div>
            </div>
        </div>
    </main>

    <script>
        // ensure products page renders in Portuguese
        try { localStorage.setItem('lang', 'pt'); } catch (e) {}
    </script>
    <script src="/js/script.js"></script>
</body>
</html>
